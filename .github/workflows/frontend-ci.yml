name: Frontend CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: Lint, Test & Build Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check ESLint Warnings & Errors
        run: npm run lint

      - name: Run Jest Unit & Integration Tests
        run: npm run test

      - name: Compile Next.js Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_STELLAR_NETWORK: "testnet"
          NEXT_PUBLIC_RPC_URL: "https://soroban-testnet.stellar.org"
          NEXT_PUBLIC_RENTAL_AGREEMENT_ID: "CCFPZOCU33AWX2NKX47XD6W5JNYFP7MU57DTQFB5XOOQSJLSSC4PMX25"
          NEXT_PUBLIC_ESCROW_ID: "CDXKQTPLDDF4RBMJCCTGV2XQ44DCJOY7XZZKPEDJFKQTECSTYHBOI42O"
